repos:
  - repo: https://github.com/pycqa/isort
    rev: "7.0.0"
    hooks:
      - id: isort
        args: ["--profile", "black"]
        exclude: |
          ^($(git config --file .gitmodules --get-regexp path | awk '{print $2}' | tr '\n' '|'))

  - repo: https://github.com/psf/black
    rev: "26.1.0"
    hooks:
      - id: black
        exclude: |
          ^($(git config --file .gitmodules --get-regexp path | awk '{print $2}' | tr '\n' '|'))

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v21.1.8"
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]
        exclude: |
          ^($(git config --file .gitmodules --get-regexp path | awk '{print $2}' | tr '\n' '|'))
